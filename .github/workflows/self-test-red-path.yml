# Orbit Self-Test — Live QA Proof (RED path)
#
# Companion to self-test.yml. This workflow is EXPECTED to end red — it
# proves the same two gates correctly BLOCK on a bad fixture, which is the
# other half of "live fail+pass proof, both directions" (CR-A079-8 QA
# Scenario 1/2). It is deliberately NOT wired to pull_request/push so it can
# never appear as a required branch-protection context — a workflow whose
# successful outcome IS a failed run would be confusing (and actively
# harmful) as a required check.
#
# LED-043 (Third Eye, 2026-07-05): dispatch-only meant nothing forced anyone
# to actually re-run this after an engine-script change to secret-detection.yml
# or alembic-single-head.yml — it relied on developer memory. CR-A087-6 Part 3
# adds a weekly `schedule:` trigger so the red-path proof runs automatically.
# Weekly (not nightly, unlike self-test.yml's PASS-path cron) is a deliberate
# choice: this is a self-test, not a product gate, so the cost of a longer
# regression-detection window is low, and a weekly cadence keeps the
# expected-failure run from generating a nightly red entry in the Actions
# history / notification stream — bounding "silent regression" to at most 7
# days after an engine-script change is the goal, not minimizing it to zero.
# `workflow_dispatch` stays for on-demand verification right after a specific
# engine-script change, without waiting for the next scheduled run.
#
# How to run + verify:
#   gh workflow run self-test-red-path.yml --repo ynetplus/orbit --ref main
#   gh run list --repo ynetplus/orbit --workflow=self-test-red-path.yml --limit 1
#   gh run view <run-id> --repo ynetplus/orbit --json conclusion,jobs
#
# Expected: overall run conclusion = failure; both jobs' conclusion = failure.
# If either job comes back `success`, the corresponding reusable workflow has
# a real bug (it failed to catch what its GATE-EVIDENCE.md row claims).
#
# Fixture provenance: see self-test.yml's header comment (shared fixtures).

name: Orbit Self-Test (Live QA Proof — RED path, dispatch + weekly schedule)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'   # weekly (Monday 06:00 UTC) — LED-043: no more relying on memory to re-run this

jobs:
  # ---- secret-detection: RED (fixture finding NOT in baseline) ----
  secret-detection-fail:
    uses: ./.github/workflows/secret-detection.yml
    permissions:
      contents: read
    with:
      baseline_path: self-test/fixtures/secrets/empty.secrets.baseline
      base_ref: self-test/base

  # ---- secret-detection exclude_globs: RED (a DIFFERENT fake secret,
  # OUTSIDE the exclude_globs pattern, still blocks — proves exclude_globs
  # is scoped to what it names, not a silent full-repo widening) ----
  secret-detection-exclude-globs-still-blocks-fail:
    uses: ./.github/workflows/secret-detection.yml
    permissions:
      contents: read
    with:
      baseline_path: self-test/fixtures/secrets/empty.secrets.baseline
      base_ref: self-test/base
      exclude_globs: "self-test/fixtures/secrets/exclude-globs/*"

  # ---- alembic-single-head: RED (2 heads) ----
  alembic-single-head-fail:
    uses: ./.github/workflows/alembic-single-head.yml
    permissions:
      contents: read
    with:
      alembic_dir: self-test/fixtures/alembic-conflict
