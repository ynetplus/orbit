# Orbit — Static AWS Credentials Ban (HARD BLOCK)
#
# Extracted from ynetplus .github/workflows/security.yml `aws-credentials-ban`
# job (CR-A079-3; originally CR-242c), behaviorally identical. Enforces
# OIDC-only authentication for all CI/CD workflows — static
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are FORBIDDEN in .github/workflows/.
#
# GATE-EVIDENCE: see docs/GATE-EVIDENCE.md in this repo.

name: Orbit — Static AWS Credentials Ban

on:
  workflow_call:
    inputs:
      exclude_files:
        description: >
          Space-separated list of workflow filenames (relative to
          .github/workflows/) to exclude from the scan — e.g. this gate's own
          consumer-side wrapper file (its documentation/echo lines would
          otherwise self-match), or a workflow with a real tolerated usage
          (e.g. an E2E job that legitimately reads a static-creds secret for
          local-only test infra).
        type: string
        default: ""

jobs:
  ban:
    name: Static AWS Credentials Ban (HARD BLOCK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: HARD BLOCK - No Static AWS Credentials in Workflows
        env:
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
        run: |
          echo "=============================================================="
          echo "🔒 STATIC AWS CREDENTIALS BAN (HARD BLOCK — Orbit)"
          echo "=============================================================="
          echo "📋 Policy: All workflows must use OIDC authentication"
          echo ""
          echo "🚫 FORBIDDEN patterns:"
          echo "   - aws-access-key-id: \${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "   - aws-secret-access-key: \${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo ""
          echo "✅ REQUIRED pattern:"
          echo "   - role-to-assume: (OIDC role ARN secret)"
          echo ""

          VIOLATIONS=0

          EXCLUDE_ARGS=()
          for f in $EXCLUDE_FILES; do
            EXCLUDE_ARGS+=("--exclude=$f")
          done

          echo "Scanning .github/workflows/ for static credentials..."
          [ ${#EXCLUDE_ARGS[@]} -gt 0 ] && echo "Excluded files: ${EXCLUDE_FILES}"
          echo ""

          check_pattern() {
            local pattern="$1"
            local label="$2"
            if grep -rn "$pattern" .github/workflows/ "${EXCLUDE_ARGS[@]}" 2>/dev/null | grep -v "^$"; then
              echo ""
              echo "❌ Found $label!"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          }

          check_pattern "secrets\.AWS_ACCESS_KEY_ID" "AWS_ACCESS_KEY_ID references"
          check_pattern "secrets\.AWS_SECRET_ACCESS_KEY" "AWS_SECRET_ACCESS_KEY references"
          check_pattern "aws-access-key-id:" "aws-access-key-id parameter"
          check_pattern "aws-secret-access-key:" "aws-secret-access-key parameter"

          echo ""
          echo "=============================================================="
          echo "RESULT"
          echo "=============================================================="

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "❌ STATIC CREDENTIALS BAN FAILED - HARD BLOCK"
            echo ""
            echo "Found $VIOLATIONS forbidden credential pattern(s)!"
            echo ""
            echo "All workflows MUST use OIDC authentication:"
            echo "  ✗ aws-access-key-id: (static credentials - FORBIDDEN)"
            echo "  ✓ role-to-assume: (OIDC role ARN - REQUIRED)"
            echo ""
            exit 1
          else
            echo ""
            echo "✅ STATIC CREDENTIALS BAN PASSED"
            echo ""
            echo "All workflows use OIDC authentication (no static keys)."
          fi
