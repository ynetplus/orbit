# Orbit — Nightly Full Secret Scan
#
# Extracted from ynetplus .github/workflows/nightly-secrets-full-scan.yml
# (CR-CI-021), behaviorally identical. PR CI (secret-detection.yml) only
# scans changed files for speed; this workflow guarantees full-repo parity
# by running detect-secrets against every tracked file on a schedule. If a
# previously-unknown secret is found, a GitHub issue is opened.
#
# GATE-EVIDENCE: see docs/GATE-EVIDENCE.md in this repo.

name: Orbit — Nightly Full Secret Scan

on:
  workflow_call:
    inputs:
      baseline_path:
        description: "Path to the consumer's committed detect-secrets baseline file."
        type: string
        default: ".secrets.baseline"
      label:
        description: "Label to attach to the auto-filed triage issue."
        type: string
        default: "security"

jobs:
  full-scan:
    name: Full repo secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # open triage issue if new secrets are found
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Full repo scan vs baseline
        id: scan
        env:
          BASELINE_PATH: ${{ inputs.baseline_path }}
        run: |
          set -euo pipefail
          detect-secrets scan --all-files \
            --exclude-files '\.secrets\.baseline$' \
            --exclude-files '\.env$' \
            --exclude-files '\.env\.example$' \
            --exclude-files '\.lock$' \
            --exclude-files '^\.git/' \
            > .secrets-full.json

          python3 - "$BASELINE_PATH" <<'PYEOF' > /tmp/new-secrets.txt
          import json, sys
          baseline = json.load(open(sys.argv[1]))
          scan = json.load(open('.secrets-full.json'))
          known = set()
          for f, secrets in baseline.get('results', {}).items():
              for s in secrets:
                  known.add((f, s['line_number'], s['type']))
          new = []
          for f, secrets in scan.get('results', {}).items():
              for s in secrets:
                  key = (f, s['line_number'], s['type'])
                  if key not in known:
                      new.append(f"{f}:{s['line_number']} - {s['type']}")
          print('\n'.join(new))
          PYEOF
          COUNT=$(grep -c . /tmp/new-secrets.txt) || COUNT=0
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Detected $COUNT unrecognised finding(s)."
          if [ "$COUNT" -gt 0 ]; then
            echo "----- /tmp/new-secrets.txt -----"
            cat /tmp/new-secrets.txt
            echo "--------------------------------"
          fi

      - name: Open issue if new secrets
        if: steps.scan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.label }}
        run: |
          set -euo pipefail
          TITLE="[nightly] New secrets detected in full scan $(date +%F)"
          BODY=$(cat <<EOF
          The nightly full-repo secret scan surfaced ${{ steps.scan.outputs.count }} finding(s)
          that are NOT present in the committed baseline.

          \`\`\`
          $(cat /tmp/new-secrets.txt)
          \`\`\`

          **Triage steps:**

          1. Verify whether each finding is a real secret or a false positive.
          2. If real: rotate the credential immediately and purge from git history.
          3. If false positive: run \`detect-secrets scan --all-files > <baseline>\`
             and audit the diff before committing.
          4. Close this issue once resolved.

          Workflow: nightly-secrets-full-scan.yml (Orbit — ynetplus/orbit)
          EOF
          )
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "$LABEL" || echo "Label '$LABEL' may not exist in this repo — issue may have been created without it; verify label exists (gh issue create fails hard on missing label)."
