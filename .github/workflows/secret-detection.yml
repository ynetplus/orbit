# Orbit — Secret Detection (HARD BLOCK)
#
# Extracted from ynetplus .github/workflows/security.yml `secret-detection`
# job (CR-A079-3 consolidation; originally CR-458/CR-CI-021). Behaviorally
# identical: same detect-secrets version resolution, same incremental-scan
# strategy (only files changed vs base_ref), same full-repo fallback when a
# merge-base cannot be determined, same baseline-diff blocking logic.
#
# Uses Yelp's detect-secrets to prevent secrets from being committed.
# Compares against the consumer's committed baseline file.
#
# `exclude_globs` implementation (CR-A079-14 Part O / F4 — Third Eye
# LED-041): the input previously mapped to the EXCLUDE_GLOBS env var but
# nothing consumed it (net inert). It's now wired into BOTH surfaces:
#   1. the changed-file selection (the "Determine changed files" step,
#      incremental mode) via scripts/apply_exclude_globs.py's `filter`
#      subcommand, and
#   2. the detect-secrets scan invocation itself (the "Scan for new
#      secrets" step, both incremental AND full-scan modes) via that same
#      script's `to-regex` subcommand, which appends extra `--exclude-files`
#      regex args.
# The engine script lives in THIS repo (Orbit), not the consumer repo, so it
# is fetched via the same self-checkout-at-pinned-SHA pattern already used
# by migration-lock-risk.yml (job.workflow_repository / job.workflow_sha —
# see that workflow's header comment for the two wrong attempts that
# preceded it). Default `exclude_globs` is `""`, which both subcommands
# treat as a pure no-op — zero behavioral delta for existing consumers
# (none currently pass this input).
#
# GATE-EVIDENCE: see docs/GATE-EVIDENCE.md in this repo.

name: Orbit — Secret Detection

on:
  workflow_call:
    inputs:
      baseline_path:
        description: "Path to the consumer's committed detect-secrets baseline file."
        type: string
        default: ".secrets.baseline"
      base_ref:
        description: "Branch to diff against for incremental scan (falls back to full scan if no merge-base)."
        type: string
        default: "stage"
      exclude_globs:
        description: >-
          Comma- and/or whitespace-separated (spaces/tabs/newlines all work)
          list of shell-style glob patterns, e.g. "fixtures/secrets/**,
          vendor/*.snap". Matched with fnmatch against the FULL repo-relative
          path — a bare "*" matches across "/" too (string glob, not a
          path-segment glob). ADDITIVE to the built-in excludes
          (.secrets.baseline, .env, .env.example, *.lock, .git/) — never
          replaces them. Applied to both the changed-file selection
          (incremental mode) and the detect-secrets scan invocation itself
          (all modes). Guard: a literal "*"/"**", or any combination of
          patterns that would exclude EVERY candidate file in a given scan,
          is rejected with a hard error rather than silently scanning
          nothing — see scripts/apply_exclude_globs.py.
        type: string
        default: ""

jobs:
  scan:
    name: Secret Detection (HARD BLOCK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history needed to diff against base branch for incremental scan.
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Resolve orbit coordinates (self, pinned SHA)
        id: orbit_ref
        env:
          JOB_CTX: ${{ toJSON(job) }}
        run: |
          REPO=$(echo "$JOB_CTX" | jq -r '.workflow_repository')
          REF=$(echo "$JOB_CTX" | jq -r '.workflow_sha')
          echo "Resolved orbit repo=$REPO ref=$REF (from job.workflow_repository / job.workflow_sha)"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout orbit engine scripts (self, pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ steps.orbit_ref.outputs.repo }}
          ref: ${{ steps.orbit_ref.outputs.ref }}
          path: _orbit-engine

      - name: Determine changed files
        id: changed
        env:
          BASE_REF_INPUT: ${{ inputs.base_ref }}
          EXCLUDE_GLOBS: ${{ inputs.exclude_globs }}
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || env.BASE_REF_INPUT }}"
          git fetch --no-tags --depth=100 origin "$BASE_REF" 2>/dev/null || \
            git fetch --no-tags origin "$BASE_REF" 2>/dev/null || true
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD 2>/dev/null || echo "")

          # exclude_globs -> --exclude-files regex args, consumed by the
          # "Scan for new secrets" step below (both incremental + full mode).
          : > .exclude-regex.txt
          if [ -n "$EXCLUDE_GLOBS" ]; then
            if ! python3 _orbit-engine/scripts/apply_exclude_globs.py to-regex "$EXCLUDE_GLOBS" > .exclude-regex.txt; then
              echo "❌ exclude_globs rejected (see error above) — aborting before any scan runs."
              exit 1
            fi
          fi

          if [ -z "$MERGE_BASE" ]; then
            echo "Could not determine merge base — falling back to full scan."
            echo "mode=full" >> $GITHUB_OUTPUT
            # Full-scan mode still uses --all-files + the regex excludes above
            # for the actual scan, but the over-widening guard needs a
            # concrete candidate list — the full tracked-file set is that
            # list here.
            if [ -n "$EXCLUDE_GLOBS" ]; then
              if ! git ls-files | python3 _orbit-engine/scripts/apply_exclude_globs.py filter "$EXCLUDE_GLOBS" > /dev/null; then
                echo "❌ exclude_globs would exclude every tracked file — aborting before any scan runs."
                exit 1
              fi
            fi
            exit 0
          fi
          CHANGED=$(git diff --name-only --diff-filter=AMR "$MERGE_BASE" HEAD \
            | grep -vE '^\.secrets\.baseline$' \
            | grep -vE '(^|/)\.env$|(^|/)\.env\.example$' \
            | grep -vE '\.lock$' \
            | grep -vE '^\.git/' \
            | while read -r f; do [ -f "$f" ] && echo "$f"; done)
          if ! printf '%s\n' "$CHANGED" | python3 _orbit-engine/scripts/apply_exclude_globs.py filter "$EXCLUDE_GLOBS" > .changed-files.txt; then
            echo "❌ exclude_globs rejected (see error above) — aborting before any scan runs."
            exit 1
          fi
          COUNT=$(grep -c . .changed-files.txt || echo 0)
          echo "Changed files: $COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "mode=none" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Scan for new secrets
        env:
          BASELINE_PATH: ${{ inputs.baseline_path }}
        run: |
          echo "=============================================================="
          echo "🔒 SECRET DETECTION (HARD BLOCK — Orbit)"
          echo "=============================================================="
          echo ""
          MODE="${{ steps.changed.outputs.mode }}"
          echo "Scan mode: $MODE"
          echo "Baseline:  $BASELINE_PATH"
          echo ""

          if [ "$MODE" = "none" ]; then
            echo "✅ No code-affecting file changes detected — nothing to scan."
            echo "Full-repo parity is guaranteed by the nightly-secrets-full-scan workflow."
            exit 0
          fi

          # exclude_globs -> extra --exclude-files regex args (written by the
          # "Determine changed files" step above; empty file = no-op, which
          # is the default and preserves existing consumers' exact behavior).
          EXTRA_EXCLUDE_ARGS=()
          if [ -s .exclude-regex.txt ]; then
            echo "Extra exclude_globs pattern(s) applied to this scan:"
            sed 's/^/   /' .exclude-regex.txt
            echo ""
            while IFS= read -r pattern; do
              [ -n "$pattern" ] && EXTRA_EXCLUDE_ARGS+=(--exclude-files "$pattern")
            done < .exclude-regex.txt
          fi

          if [ "$MODE" = "incremental" ]; then
            echo "Scanning files touched in this PR (baseline still applied):"
            sed 's/^/   /' .changed-files.txt
            echo ""
            xargs -r -a .changed-files.txt detect-secrets scan \
              --exclude-files '\.secrets\.baseline$' \
              --exclude-files '\.env$' \
              --exclude-files '\.env\.example$' \
              --exclude-files '\.lock$' \
              --exclude-files '^\.git/' \
              "${EXTRA_EXCLUDE_ARGS[@]}" \
              > .secrets-scan.json || true
            if [ ! -s .secrets-scan.json ]; then
              echo '{"version": "1.4.0", "plugins_used": [], "results": {}}' > .secrets-scan.json
              echo "No files to scan — emitting empty result."
            fi
          else
            detect-secrets scan \
              --all-files \
              --exclude-files '\.secrets\.baseline$' \
              --exclude-files '\.env$' \
              --exclude-files '\.env\.example$' \
              --exclude-files '\.lock$' \
              --exclude-files '^\.git/' \
              "${EXTRA_EXCLUDE_ARGS[@]}" \
              > .secrets-scan.json
          fi

          if [ -f "$BASELINE_PATH" ]; then
            echo "Comparing against baseline..."
            NEW_SECRETS=$(python3 - "$BASELINE_PATH" << 'PYEOF'
          import json, sys

          with open(sys.argv[1]) as f:
              baseline = json.load(f)
          with open('.secrets-scan.json') as f:
              scan = json.load(f)

          baseline_set = set()
          for file, secrets in baseline.get('results', {}).items():
              for s in secrets:
                  baseline_set.add(f"{file}:{s['line_number']}:{s['type']}")

          new_count = 0
          for file, secrets in scan.get('results', {}).items():
              for s in secrets:
                  key = f"{file}:{s['line_number']}:{s['type']}"
                  if key not in baseline_set:
                      print(f"  NEW: {file}:{s['line_number']} — {s['type']}")
                      new_count += 1

          print(f"\n{new_count}")
          PYEOF
          )

            COUNT=$(echo "$NEW_SECRETS" | tail -1)
            if [ "$COUNT" -gt 0 ]; then
              echo ""
              echo "❌ DETECTED $COUNT NEW potential secret(s)!"
              echo "$NEW_SECRETS" | head -n -1
              echo ""
              echo "If these are false positives, update $BASELINE_PATH"
              exit 1
            else
              echo ""
              echo "✅ No new secrets detected (baseline: $(python3 -c "import json; data=json.load(open('$BASELINE_PATH')); print(sum(len(v) for v in data.get('results',{}).values()))") known FPs)"
            fi
          else
            echo "⚠️  No baseline found at $BASELINE_PATH — scanning from scratch"
            SECRETS=$(python3 -c "
          import json
          with open('.secrets-scan.json') as f:
              data = json.load(f)
          count = sum(len(v) for v in data.get('results', {}).values())
          print(count)
          ")
            if [ "$SECRETS" -gt 0 ]; then
              echo "❌ DETECTED $SECRETS potential secret(s)!"
              exit 1
            fi
            echo "✅ No secrets detected"
          fi
