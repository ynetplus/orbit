# Orbit — Migration Lock-Risk Analysis (WARN)
#
# Extracted from ynetplus .github/workflows/ci.yml `migration-standard` job's
# "WARN - Migration Lock-Risk Analysis" step (CR-A078-14), behaviorally
# identical: finds newly-added Alembic migration files vs base_ref, then
# runs the engine script (scripts/check_migration_lock_risk.py, moved into
# this repo unchanged) against them. WARN-only gate — always exits 0.
#
# Engine script provenance: this workflow checks out ITS OWN repo (Orbit) at
# the exact SHA the consumer pinned when it wrote
# `uses: ynetplus/orbit/.github/workflows/migration-lock-risk.yml@<sha>`.
# The `job` context's `workflow_repository` / `workflow_sha` fields (GitHub
# docs: "Contexts" -> "job context") identify the CALLED reusable workflow's
# own coordinates (`owner/repo` + the exact pinned commit SHA) for the job
# currently running — so the script version always matches the pinned
# workflow SHA, with no separate ref to keep in sync. Read via `toJSON(job)`
# + `jq` rather than direct `${{ job.workflow_repository }}` property access
# because actionlint's embedded `job`-context type schema (current as of
# v1.7.11) doesn't yet include these fields even though they're real,
# documented GitHub Actions context fields — going through `toJSON` sidesteps
# the false-positive "property not defined" lint error without an `-ignore`
# escape hatch or a stale/incomplete schema override.
#
# HISTORY (CR-A079-8 fix history — two wrong attempts before this one, both
# from the Onest adoption's CR-A079-10 live QA, run 28685289814):
# 1. Original bug: `github.workflow_ref` (top-level `github` context). In a
#    `workflow_call` chain this always resolves to the TOP-LEVEL/CALLER
#    workflow's coordinates, not this called workflow's — so every
#    consumer's self-checkout resolved to the CONSUMER's own repo/ref
#    instead of Orbit's, and the engine script was never found ("No such
#    file or directory") on every invocation.
# 2. First fix attempt (fix-pass-2, orbit PR #3): tried `github.job_workflow_ref`.
#    This does NOT exist as a `github`-context property at all (confirmed
#    both by actionlint's type schema AND by a live re-test after merging —
#    the expression silently evaluated to an empty string, since GitHub
#    Actions expressions return null/empty for an undefined property rather
#    than erroring, so the bug looked identical: same "No such file or
#    directory" failure). GitHub's actual documented field for this is
#    `job.workflow_repository` / `job.workflow_sha` — part of the `job`
#    context, not `github`. Corrected here (fix-pass-3).
#
# GATE-EVIDENCE: see docs/GATE-EVIDENCE.md in this repo.

name: Orbit — Migration Lock-Risk Analysis

on:
  workflow_call:
    inputs:
      migrations_glob:
        description: "Glob (relative to repo root) matching Alembic migration files."
        type: string
        default: "backend/alembic/versions/*.py"
      base_ref:
        description: "Branch to diff against to find newly-added migration files."
        type: string
        default: "stage"

jobs:
  lock-risk:
    name: Migration Lock-Risk Analysis (WARN)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve orbit coordinates (self, pinned SHA)
        id: orbit_ref
        env:
          JOB_CTX: ${{ toJSON(job) }}
        run: |
          REPO=$(echo "$JOB_CTX" | jq -r '.workflow_repository')
          REF=$(echo "$JOB_CTX" | jq -r '.workflow_sha')
          echo "Resolved orbit repo=$REPO ref=$REF (from job.workflow_repository / job.workflow_sha)"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout orbit engine scripts (self, pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ steps.orbit_ref.outputs.repo }}
          ref: ${{ steps.orbit_ref.outputs.ref }}
          path: _orbit-engine

      - name: Find newly-added migration files
        id: new_migrations
        env:
          MIGRATIONS_GLOB: ${{ inputs.migrations_glob }}
          BASE_REF_INPUT: ${{ inputs.base_ref }}
        run: |
          echo "=============================================================="
          echo "⚠️  MIGRATION LOCK-RISK ANALYSIS (WARN — Orbit)"
          echo "=============================================================="
          echo "Checking new migrations for DDL patterns that acquire long-held locks."
          echo "Reference: RN-019 §3 / GoCardless 15s outage post-mortem"
          echo ""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="origin/${BASE_REF_INPUT}"
          fi

          # Convert the glob into a grep-friendly regex for the diff filter.
          REGEX=$(echo "$MIGRATIONS_GLOB" | sed 's/\*/[^\/]*/g' | sed 's/\//\\\//g')

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE_SHA" HEAD 2>/dev/null \
            | grep -E "^${REGEX}$" || true)

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migration files in this PR -- lock-risk check skipped."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New migration files:"
          echo "$NEW_MIGRATIONS" | sed 's/^/   /'
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$NEW_MIGRATIONS" > .new-migrations.txt

      - name: Run lock-risk analyzer
        if: steps.new_migrations.outputs.has_new == 'true'
        run: |
          python3 _orbit-engine/scripts/check_migration_lock_risk.py $(cat .new-migrations.txt)
          echo ""
          echo "=============================================================="
          echo "⚠️  LOCK-RISK ANALYSIS COMPLETE (exit 0 — WARN gate only)"
          echo "Safe to ignore: new tables, tiny tables, off-hours deploys."
          echo "Suppress: add '# LOCK-RISK: ACCEPTED — <reason>' before op call."
          echo "=============================================================="
