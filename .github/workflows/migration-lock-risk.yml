# Orbit — Migration Lock-Risk Analysis (WARN)
#
# Extracted from ynetplus .github/workflows/ci.yml `migration-standard` job's
# "WARN - Migration Lock-Risk Analysis" step (CR-A078-14), behaviorally
# identical: finds newly-added Alembic migration files vs base_ref, then
# runs the engine script (scripts/check_migration_lock_risk.py, moved into
# this repo unchanged) against them. WARN-only gate — always exits 0.
#
# Engine script provenance: this workflow checks out ITS OWN repo (Orbit) at
# the exact SHA the consumer pinned when it wrote
# `uses: ynetplus/orbit/.github/workflows/migration-lock-risk.yml@<sha>`.
#
# BF FIX (2026-07-03, live-proven via ynetplus CR-A079-13's first real
# consumer PR — run 28686624241/job 85080422658): the original CR-A078-8
# implementation tried to self-detect Orbit's own coordinates via
# `github.workflow_ref`. That context is a RUN-level attribute — it always
# resolves to the TOP-LEVEL/triggering workflow file for the whole run
# (e.g. the consumer's `security.yml`), never to "the reusable workflow
# file that defines the current job". There is NO `github.*` context
# expression that exposes that (confirmed against actionlint's context
# schema — `job_workflow_ref` is an OIDC ID-TOKEN CLAIM, not a `github.*`
# expression available in `${{ }}`; a first attempted fix that swapped in
# `github.job_workflow_ref` does not exist as a context field and would
# have failed actionlint, let alone runtime). The original design silently
# checked out the CONSUMER repo into `_orbit-engine/` instead of Orbit, so
# `_orbit-engine/scripts/*.py` never existed and every call failed with
# "No such file or directory". Never caught by CR-A079-8's self-test
# (migration-lock-risk/sast-semgrep/supply-audit were explicitly NOT in the
# self-test matrix — see that CR's forge report "Deviations" section, which
# assumed lint/structural checks were sufficient proof; they were not).
#
# THE FIX: self-detection is abandoned. The repo name is a static literal
# ("ynetplus/orbit" — this workflow IS Orbit, checking out itself, so the
# repo never varies). The ref genuinely cannot be self-discovered, so the
# caller passes it explicitly via the `orbit_ref` input — the exact same
# SHA already in the caller's own `uses: .../migration-lock-risk.yml@<sha>`
# line, just also written into `with: orbit_ref: <sha>`. Yes, this
# duplicates the SHA in two places in the caller's YAML; that's the
# unavoidable cost of there being no framework-level way to avoid it.
#
# GATE-EVIDENCE: see docs/GATE-EVIDENCE.md in this repo.

name: Orbit — Migration Lock-Risk Analysis

on:
  workflow_call:
    inputs:
      migrations_glob:
        description: "Glob (relative to repo root) matching Alembic migration files."
        type: string
        default: "backend/alembic/versions/*.py"
      base_ref:
        description: "Branch to diff against to find newly-added migration files."
        type: string
        default: "stage"
      orbit_ref:
        description: >-
          REQUIRED. The exact Orbit commit SHA this workflow is pinned at in
          your `uses: ynetplus/orbit/.github/workflows/migration-lock-risk.yml@<sha>`
          line — paste the same SHA here. GitHub Actions has no context
          expression that lets a reusable workflow discover its own pinned
          ref (see header comment), so the caller must state it explicitly.
        type: string

jobs:
  lock-risk:
    name: Migration Lock-Risk Analysis (WARN)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Guard - orbit_ref input provided
        run: |
          if [ -z "${{ inputs.orbit_ref }}" ]; then
            echo "❌ 'orbit_ref' input is required — pass the same SHA used in your 'uses:' line for this workflow. See this workflow file's header comment for why."
            exit 1
          fi

      - name: Checkout orbit engine scripts (self, pinned via caller-supplied orbit_ref)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ynetplus/orbit
          ref: ${{ inputs.orbit_ref }}
          path: _orbit-engine

      - name: Find newly-added migration files
        id: new_migrations
        env:
          MIGRATIONS_GLOB: ${{ inputs.migrations_glob }}
          BASE_REF_INPUT: ${{ inputs.base_ref }}
        run: |
          echo "=============================================================="
          echo "⚠️  MIGRATION LOCK-RISK ANALYSIS (WARN — Orbit)"
          echo "=============================================================="
          echo "Checking new migrations for DDL patterns that acquire long-held locks."
          echo "Reference: RN-019 §3 / GoCardless 15s outage post-mortem"
          echo ""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="origin/${BASE_REF_INPUT}"
          fi

          # Convert the glob into a grep-friendly regex for the diff filter.
          REGEX=$(echo "$MIGRATIONS_GLOB" | sed 's/\*/[^\/]*/g' | sed 's/\//\\\//g')

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE_SHA" HEAD 2>/dev/null \
            | grep -E "^${REGEX}$" || true)

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migration files in this PR -- lock-risk check skipped."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New migration files:"
          echo "$NEW_MIGRATIONS" | sed 's/^/   /'
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$NEW_MIGRATIONS" > .new-migrations.txt

      - name: Run lock-risk analyzer
        if: steps.new_migrations.outputs.has_new == 'true'
        run: |
          python3 _orbit-engine/scripts/check_migration_lock_risk.py $(cat .new-migrations.txt)
          echo ""
          echo "=============================================================="
          echo "⚠️  LOCK-RISK ANALYSIS COMPLETE (exit 0 — WARN gate only)"
          echo "Safe to ignore: new tables, tiny tables, off-hours deploys."
          echo "Suppress: add '# LOCK-RISK: ACCEPTED — <reason>' before op call."
          echo "=============================================================="
